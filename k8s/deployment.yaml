apiVersion: apps/v1
kind: Deployment
metadata:
  name: perf-lab
  labels:
    app: perf-lab
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: perf-lab
  template:
    metadata:
      labels:
        app: perf-lab
    spec:
      terminationGracePeriodSeconds: 15
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - perf-lab
              topologyKey: "kubernetes.io/hostname"
      serviceAccountName: perf-lab
      containers:
      - name: perf-lab
        image: index.docker.io/olmigar/perf-lab:main-20260306071911-62a76b6 # {"$imagepolicy": "flux-system:perf-lab"}
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        envFrom:
          - configMapRef:
              name: perf-lab-config
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            memory: 128Mi
        livenessProbe:
          httpGet:
            path: /v1/health
            port: http
          initialDelaySeconds: 1
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /v1/health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
