version: '3'

vars:
  IMAGE_NAME: stock-ticker
  TAG: '{{.TAG | default "latest"}}'
  LOCAL_PORT: 8080

tasks:
  build:
    desc: Build the Go binary
    cmds:
      - go build -o server ./cmd/api

  run:
    desc: Run the server locally
    cmds:
      - go run ./cmd/api

  test:
    desc: Run tests
    cmds:
      - go test -v ./...

  tidy:
    desc: Tidy go modules
    cmds:
      - go mod tidy

  docker-build:
    desc: Build Docker image
    cmds:
      - docker build -t {{.IMAGE_NAME}}:{{.TAG}} .

  k8s-apply:
    desc: Apply Kubernetes manifests
    cmds:
      - kubectl apply -f k8s/

  k8s-delete:
    desc: Delete Kubernetes resources
    cmds:
      - kubectl delete -f k8s/

  port-forward:
    desc: Port forward to the service
    cmds:
      - kubectl port-forward svc/stock-ticker {{.LOCAL_PORT}}:80

  curl-health:
    desc: Curl the health endpoint
    cmds:
      - curl -s http://localhost:{{.LOCAL_PORT}}/v1/health

  curl-stock:
    desc: Curl the stock endpoint
    cmds:
      - curl -s http://localhost:{{.LOCAL_PORT}}/v1/stock
